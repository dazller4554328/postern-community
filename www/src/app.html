<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="%sveltekit.assets%/favicon.svg" color="#3ddc97" />
    <meta name="theme-color" content="#0a0f1a" />

    <!-- Deliberate type pairing: Space Grotesk (display) + Inter (body).
         Preconnect + swap so the first paint never blocks on the network. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
    />

    <!-- Resolve theme before first paint to avoid a light/dark flash. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('postern-theme');
          var theme =
            stored ||
            (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
